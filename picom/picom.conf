#/################################
#       Backend & General       #
#################################

backend = "glx";
vsync = true;
use-damage = true;
unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;


#################################
#          Animations           #
#################################

animations = true;
animation-stiffness = 120;
animation-window-mass = 0.40;
animation-dampening = 18;
animation-clamping = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "slide-down";
animation-force-steps = 1;


#################################
#             Fading            #
#################################

fading = false;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [];


#################################
#            Shadows            #
#################################

shadow = false;
shadow-radius = 12;
shadow-opacity = 0.40;
shadow-offset-x = -6;
shadow-offset-y = -6;

shadow-exclude = [
  "class_g = 'i3-frame'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#          Transparency          #
#################################

inactive-opacity = 0.1;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
   "100:class_g = 'dmenu'"
];


#################################
#        Rounded Corners        #
#################################

corner-radius = 0;
rounded-corners-exclude = [
  "class_g = 'i3-frame'",
  "class_g = 'Polybar'"
];


#################################
#            Blur               #
#################################

blur-background = true;
blur-method = "kawase";
blur-strength = 2;
blur-kawase-strength = 9;
blur-background-frame = true;
blur-background-fixed = true;

blur-exclude = [
  "class_g = 'dmenu'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#          Window Types         #
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; };
  dock    = { shadow = false; };
  dnd     = { shadow = false; };
  popup_menu = { shadow = true; blur-background = true; };
  dropdown_menu = { shadow = true; blur-background = true; };
};


#################################
#        Experimental Flags     #
#################################

glx-no-stencil = true;
glx-no-rebind-pixmap = true;


