[main]
font=JetBrainsMono Nerd Font:size=14
prompt-font=JetBrainsMono Nerd Font:size=12:bold
width=60
lines=15
anchor=center
horizontal-pad=20
vertical-pad=20
inner-pad=8
layer=overlay
terminal=alacritty
# You can add more main settings if needed

[colors]
background=000000aa        # Window background with alpha
text=cdcdcdff              # Normal text
prompt=cdcdcdaa            # Prompt text
selection=141717ff         # Highlighted selection background
selection-text=F2EAD3ff    # Text on selection
border=F2EAD3ff            # Border color
match=F2EAD3ff             # Matching text highlight for filter
placeholder=cdcdcdaa        # Placeholder text

[border]
width=0
radius=0

[entry]
padding=6
border-width=0

